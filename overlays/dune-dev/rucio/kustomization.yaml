# kustomize.yaml for rucio-dune-dev
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- helm-rucio-server.yaml
- helm-rucio-daemons.yaml
- helm-rucio-webui.yaml
- cache.yaml
- prometheus.yaml
- messenger.yaml
- routes.yaml
- grid-certificates-pvc.yaml
- grid-certificates-cronjob.yaml
- grid-certificates-job.yaml

patches:
- path: grid-certificates-patch.yaml
- path: patch-server.yaml
- path: patch-busybox.yaml
- path: patch-renew-fts-proxy-job.yaml
- target:
    kind: Deployment
    labelSelector: "app-group=rucio-daemons"
  path: patch-install-policy-package.yaml

configMapGenerator:
- files:
  - rucio.conf.j2=etc/rucio-server.conf.j2
  name: server-rucio-conf-j2
- files:
  - prometheus.yml=etc/prometheus.yml
  name: prometheus-yml
  options:
    disableNameSuffixHash: true

