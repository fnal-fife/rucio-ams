apiVersion: v1
kind: Pod
metadata:
  name: init
  labels:
    app: rucio
spec:
  serviceAccountName: useroot
  restartPolicy: Never
  containers:
    - name: init
      image: rucio/rucio-init:release-40.1.2
      imagePullPolicy: Always
      env:
        - name: RUCIO_CFG_DATABASE_DEFAULT
          valueFrom:
            secretKeyRef:
              key: db-connstr.txt
              name: fnal-init-db-connstr
        - name: RUCIO_PRINT_CFG
          value: "true"
        - name: RUCIO_CFG_BOOTSTRAP_SSH_IDENTITY
          valueFrom:
            secretKeyRef:
              key: ssh-id
              name: fnal-init-ssh-identity
      command: ["sleep", "infinity"]
      resources:
        requests:
          cpu: 1
          memory: 1Gi
        limits:
          cpu: 1
          memory: 1Gi
