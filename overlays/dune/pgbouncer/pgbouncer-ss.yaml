apiVersion: v1
kind: ConfigMap
metadata:
  name: rucio-pgbouncer-config-ss
data:
  pgbouncer.ini: |
    [databases]
    __DB_NAME__ = host=__DB_HOST__ port=__DB_PORT__ dbname=__DB_NAME__

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = md5
    auth_file = /opt/bitnami/pgbouncer/conf/userlist.txt
    pool_mode = session
    max_client_conn = 300
    default_pool_size = 5
    idle_transaction_timeout = 0
    server_idle_timeout = 60
    reserve_pool_size = 1
    server_reset_query = DISCARD ALL
    log_connections = 1
    log_disconnections = 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rucio-pgb-ss
  labels:
    app: rucio-pgb-ss
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rucio-pgb-ss
  template:
    metadata:
      labels:
        app: rucio-pgb-ss
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: generate-pgbouncer-config
        image: public.ecr.aws/bitnami/pgbouncer:1.25.1
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
        command:
        - /bin/sh
        - -ec
        - |
          set -eu
          sed \
            -e "s/__DB_HOST__/${DB_HOST}/g" \
            -e "s/__DB_PORT__/${DB_PORT}/g" \
            -e "s/__DB_NAME__/${DB_NAME}/g" \
            /template/pgbouncer.ini > /opt/bitnami/pgbouncer/conf/pgbouncer.ini
          printf '"%s" "md5%s"\n' \
            "${DB_USER}" \
            "$(printf '%s' "${DB_PASSWORD}${DB_USER}" | md5sum | awk '{print $1}')" \
            > /opt/bitnami/pgbouncer/conf/userlist.txt
        envFrom:
        - secretRef:
            name: rucio-pgb-db-target
        volumeMounts:
        - name: pgbouncer-config-template
          mountPath: /template
        - name: pgbouncer-opt-conf
          mountPath: /opt/bitnami/pgbouncer/conf
      containers:
      - name: pgbouncer
        image: public.ecr.aws/bitnami/pgbouncer:1.25.1
        imagePullPolicy: IfNotPresent
        # We bypass Bitnami entrypoint because config is generated by initContainer and root FS is read-only.
        command:
        - /opt/bitnami/pgbouncer/bin/pgbouncer
        args:
        - /opt/bitnami/pgbouncer/conf/pgbouncer.ini
        env:
        - name: POSTGRESQL_HOST
          valueFrom:
            secretKeyRef:
              name: rucio-pgb-db-target
              key: DB_HOST
        - name: POSTGRESQL_PORT_NUMBER
          valueFrom:
            secretKeyRef:
              name: rucio-pgb-db-target
              key: DB_PORT
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: rucio-pgb-db-target
              key: DB_NAME
        - name: POSTGRESQL_USERNAME
          valueFrom:
            secretKeyRef:
              name: rucio-pgb-db-target
              key: DB_USER
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rucio-pgb-db-target
              key: DB_PASSWORD
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        ports:
        - containerPort: 5432
          name: postgres
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 6
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: pgbouncer-opt-conf
          mountPath: /opt/bitnami/pgbouncer/conf
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: pgbouncer-config-template
        configMap:
          name: rucio-pgbouncer-config-ss
      - name: pgbouncer-opt-conf
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rucio-pgb-ss
spec:
  type: ClusterIP
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
  selector:
    app: rucio-pgb-ss
