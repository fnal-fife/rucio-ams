apiVersion: apps/v1
kind: Deployment
metadata:
  name: fnal-rucio-webui
spec:
  template:
    spec:
      volumes:
       - name: ca-volume
         secret:
           $patch: delete
         persistentVolumeClaim:
           claimName: grid-certificates-pvc
      containers:
        - name: httpd-error-log
          image: imageregistry.fnal.gov/docker.io/busybox
          resources:
            limits:
              cpu: 30m
              memory: 50Mi
            requests:
              cpu: 20m
              memory: 20Mi
        - name: webui-log
          image: imageregistry.fnal.gov/docker.io/busybox
          resources:
            limits:
              cpu: 30m
              memory: 50Mi
            requests:
              cpu: 20m
              memory: 20Mi
