apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy
  namespace: rucio-dune-int
spec:
  replicas: 1
  selector:
    matchLabels:
      app: haproxy
  template:
    metadata:
      labels:
        app: haproxy
    spec:
      containers:
        - name: haproxy
          image: haproxytech/haproxy-alpine:2.9
          ports:
            - containerPort: 443
              protocol: TCP
            - containerPort: 1025
              protocol: TCP
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
          readinessProbe:
            httpGet:
              path: /
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          serviceAccount: useroot
          serviceAccountName: useroot
      volumes:
        - name: haproxy-config
          configMap:
            name: haproxy-config
