apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
  namespace: rucio-dune-int
data:
  haproxy.cfg: |
    global
        log stdout format raw local0
        maxconn 4096

    defaults
        log     global
        mode    http
        option  httplog
        option  dontlognull
        option  forwardfor
        option  http-server-close
        timeout connect 5s
        timeout client  30s
        timeout server  30s

    resolvers clusterdns
        nameserver dns1 172.30.0.10:53
        accepted_payload_size 8192
        hold valid      5s
        hold other      5s
        hold refused    5s
        hold nx         5s
        hold timeout    5s

    frontend http-in
        bind *:443
        default_backend rucio-server-pods

    backend rucio-server-pods
        balance leastconn
        server-template pod 12 fnal-rucio-server-headless.rucio-dune-int.svc.cluster.local:443 resolvers clusterdns resolve-prefer ipv4 init-addr none check inter 5s

    listen stats
        bind *:1024
        stats enable
        stats uri /stats
        stats refresh 5s
        stats show-legends

    frontend prometheus-stats
        bind *:8404
        mode http
        stats enable
        stats uri /
        http-request use-service prometheus-exporter if { path /metrics }

